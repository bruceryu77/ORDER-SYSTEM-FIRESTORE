<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Product Admin · Firestore</title>
  <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
  <style>
    :root {
      --ink: #1c1914;
      --card: #fffdf8;
      --line: #d9d0c2;
      --accent: #0f6b4c;
      --danger: #a12828;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(160deg, #efe8da, #f7f3ea 45%, #e7f0ea);
      color: var(--ink);
      min-height: 100vh;
    }
    .wrap { max-width: 920px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { margin: 0 0 8px; font-size: 1.6rem; }
    .sub { color: #5c564c; margin-bottom: 20px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .row { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
    @media (max-width: 700px) { .row { grid-template-columns: 1fr; } }
    label { display: grid; gap: 6px; font-size: 0.9rem; }
    input, select, button, textarea {
      font: inherit;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary { background: #3f3a33; }
    button.danger { background: var(--danger); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .error { color: var(--danger); min-height: 1.2em; }
    .list { display: grid; gap: 10px; }
    .item {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }
    .item img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      background: #eee;
    }
    .muted { color: #6b6458; font-size: 0.85rem; }
    .hidden { display: none !important; }
    .topbar { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .search-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      margin-top: 10px;
    }
    @media (max-width: 560px) {
      .search-row { grid-template-columns: 1fr 1fr; }
      .search-row input { grid-column: 1 / -1; }
    }
    .upc-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }
    .upc-row label { margin: 0; }

    /* Camera overlay (from ULTRA ORDER barcode upgrade) */
    #cameraOverlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      flex-direction: column;
      z-index: 1100;
    }
    .camera-container {
      background: #000;
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    .camera-viewport {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #000;
    }
    #cameraVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #scanCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .scan-status {
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(40, 40, 40, 0.85);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      z-index: 12;
      font-weight: 600;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .scan-status.detecting { background: rgba(40, 40, 40, 0.9); }
    .scan-status.success { background: rgba(76, 175, 80, 0.95); color: #fff; }
    .scan-tap-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 15;
      background: rgba(0, 0, 0, 0.25);
    }
    .scan-tap-overlay.hidden { display: none; }
    .scan-tap-btn {
      background: rgba(50, 50, 50, 0.9);
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 28px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }
    .scan-tap-btn:active { transform: scale(0.97); }
    .scan-line {
      position: absolute;
      left: 10%;
      width: 80%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #e53935, transparent);
      box-shadow: 0 0 8px rgba(229, 57, 53, 0.6);
      z-index: 11;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .scan-line.active {
      opacity: 1;
      animation: scanLineMove 2s ease-in-out infinite;
    }
    @keyframes scanLineMove {
      0%, 100% { top: 25%; }
      50% { top: 75%; }
    }
    .camera-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      background: rgba(0, 0, 0, 0.85);
      z-index: 20;
      gap: 12px;
    }
    .cam-tool-btn {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
    }
    .cam-tool-btn.active { background: rgba(255, 255, 255, 0.2); }
    .cam-tool-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .zoom-toggle {
      display: flex;
      background: rgba(60, 60, 60, 0.8);
      border-radius: 24px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .zoom-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.7);
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 0;
    }
    .zoom-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .zoom-btn.active {
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      border-radius: 20px;
    }
    .cam-close-btn {
      background: rgba(80, 80, 80, 0.8);
      border: none;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-left: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Product Admin</h1>
        <p class="sub">Firestore 상품 + Storage 이미지 등록</p>
      </div>
      <div class="btns">
        <a href="index.html" style="align-self:center;color:var(--accent);">← 주문 앱</a>
        <a href="migrate.html" style="align-self:center;color:var(--accent);">Sheet 이전</a>
        <button type="button" class="secondary hidden" id="btnLogout">Logout</button>
      </div>
    </div>

    <div class="card" id="loginCard">
      <label>ID (이메일)
        <input type="email" id="email" autocomplete="username" placeholder="bruceryu77@gmail.com" />
      </label>
      <label style="margin-top:10px;">Password
        <input type="password" id="password" autocomplete="current-password" />
      </label>
      <p class="error" id="loginError"></p>
      <button type="button" id="btnLogin" style="margin-top:8px;width:100%;">Login</button>
    </div>

    <div id="adminShell" class="hidden">
      <div class="card">
        <h2 style="margin-top:0;font-size:1.1rem;">상품 추가 / 수정</h2>
        <input type="hidden" id="editId" />
        <div class="row">
          <label>Name *
            <input id="name" placeholder="COLORSILK 03 ULT/LT SUN BLONDE" />
          </label>
          <label>Brand
            <input id="brand" placeholder="COLORSILK (비우면 이름에서 추정)" />
          </label>
          <label>Price
            <input id="price" type="number" step="0.01" min="0" value="0" />
          </label>
          <label>Stock
            <input id="stock" type="number" step="1" min="0" value="0" />
          </label>
        </div>
        <div class="upc-row" style="margin-top:10px;">
          <label>UPC
            <input id="upc" placeholder="예: 012345678905" inputmode="numeric" />
          </label>
          <button type="button" class="secondary" id="btnScanUpc">카메라 스캔</button>
        </div>
        <label style="margin-top:10px;">Image
          <input id="image" type="file" accept="image/*" />
        </label>
        <p class="muted" id="currentImageHint"></p>
        <p class="error" id="formError"></p>
        <div class="btns" style="margin-top:10px;">
          <button type="button" id="btnSave">Save product</button>
          <button type="button" class="secondary" id="btnReset">Clear form</button>
        </div>
      </div>

      <div class="card">
        <div class="topbar">
          <h2 style="margin:0;font-size:1.1rem;">등록된 상품</h2>
          <button type="button" class="secondary" id="btnRefresh">Refresh</button>
        </div>
        <div class="search-row">
          <input type="search" id="searchInput" placeholder="이름 / 브랜드 / UPC 검색" autocomplete="off" />
          <button type="button" class="secondary" id="btnSearchScan">스캔 검색</button>
          <button type="button" class="secondary" id="btnClearSearch">Clear</button>
        </div>
        <p class="muted" id="listStatus">-</p>
        <div class="list" id="list"></div>
      </div>
    </div>
  </div>

  <div id="cameraOverlay">
    <div class="camera-container">
      <div class="camera-viewport">
        <video id="cameraVideo" autoplay playsinline muted></video>
        <canvas id="scanCanvas"></canvas>
        <div class="scan-line" id="scanLine"></div>
        <div class="scan-status scanning" id="scanStatus">카메라 초기화 중...</div>
        <div class="scan-tap-overlay" id="scanTapOverlay">
          <button type="button" class="scan-tap-btn" id="scanTapBtn">탭하여 스캔 시작</button>
        </div>
      </div>
      <div class="camera-toolbar">
        <button type="button" class="cam-tool-btn" id="flashBtn" title="플래시" disabled>🔦</button>
        <button type="button" class="cam-tool-btn" id="galleryBtn" title="갤러리에서 스캔">🖼️</button>
        <div class="zoom-toggle">
          <button type="button" class="zoom-btn active" id="zoom1x">1x</button>
          <button type="button" class="zoom-btn" id="zoom2x">2x</button>
        </div>
        <button type="button" class="cam-close-btn" id="btnCloseCamera">닫기</button>
      </div>
    </div>
  </div>
  <input type="file" id="galleryImageInput" accept="image/*" style="display:none;" />

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="config.js"></script>
  <script>
    const CFG = window.APP_CONFIG || {};
    const COLLECTION = CFG.PRODUCTS_COLLECTION || "products";
    const PREFIX = CFG.STORAGE_PRODUCTS_PREFIX || "products";

    const els = {
      loginCard: document.getElementById("loginCard"),
      adminShell: document.getElementById("adminShell"),
      email: document.getElementById("email"),
      password: document.getElementById("password"),
      loginError: document.getElementById("loginError"),
      btnLogin: document.getElementById("btnLogin"),
      btnLogout: document.getElementById("btnLogout"),
      editId: document.getElementById("editId"),
      name: document.getElementById("name"),
      brand: document.getElementById("brand"),
      price: document.getElementById("price"),
      stock: document.getElementById("stock"),
      upc: document.getElementById("upc"),
      image: document.getElementById("image"),
      currentImageHint: document.getElementById("currentImageHint"),
      formError: document.getElementById("formError"),
      btnSave: document.getElementById("btnSave"),
      btnReset: document.getElementById("btnReset"),
      btnRefresh: document.getElementById("btnRefresh"),
      btnScanUpc: document.getElementById("btnScanUpc"),
      searchInput: document.getElementById("searchInput"),
      btnSearchScan: document.getElementById("btnSearchScan"),
      btnClearSearch: document.getElementById("btnClearSearch"),
      list: document.getElementById("list"),
      listStatus: document.getElementById("listStatus")
    };

    let auth, db, storage;
    let editingImageUrl = "";
    let editingImagePath = "";
    /** @type {Array<object>} */
    let allProducts = [];
    /** 'upc' | 'search' — where to apply scanned barcode */
    let scanTarget = "upc";

    // Camera scan state (from barcode upgrade)
    let codeReader = null;
    let currentVideoInputDeviceId = null;
    let lastScannedCode = null;
    let lastScanTime = 0;
    const scanDebounceTime = 1000;
    let isScanning = false;
    let scanSessionActive = false;
    let cameraVideoTrack = null;
    let flashEnabled = false;
    let currentZoom = 1;
    let maxZoom = 1;
    let detectionFrameId = null;
    let barcodeDetector = null;
    let isProcessingScan = false;
    let lastDetectTime = 0;

    function guessBrand(name) {
      const n = String(name || "").trim().toUpperCase();
      if (n.startsWith("COLORSILK")) return "COLORSILK";
      if (n.startsWith("ECOCO") || n === "ECO") return "ECOCO";
      if (n.startsWith("FANTASIA")) return "FANTASIA";
      if (n.startsWith("YARDLEY")) return "YARDLEY";
      if (n.startsWith("GIL ") || n.startsWith("GILL") || n === "GILLETTE") return "GILLETTE";
      return n.split(/\s+/)[0] || "";
    }

    function normalizeUpc(v) {
      return String(v || "").trim().replace(/\s+/g, "");
    }

    function resetForm() {
      els.editId.value = "";
      els.name.value = "";
      els.brand.value = "";
      els.price.value = "0";
      els.stock.value = "0";
      els.upc.value = "";
      els.image.value = "";
      editingImageUrl = "";
      editingImagePath = "";
      els.currentImageHint.textContent = "";
      els.formError.textContent = "";
    }

    function fillForm(p) {
      els.editId.value = p.id;
      els.name.value = p.name || "";
      els.brand.value = p.brand || "";
      els.price.value = String(p.price ?? 0);
      els.stock.value = String(p.stock ?? 0);
      els.upc.value = p.upc || "";
      els.image.value = "";
      editingImageUrl = p.imageUrl || "";
      editingImagePath = p.imagePath || "";
      els.currentImageHint.textContent = editingImageUrl ? "현재 이미지 유지 (새 파일을 고르면 교체)" : "이미지 없음";
      els.formError.textContent = "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function filterProducts(query) {
      const q = String(query || "").trim().toLowerCase();
      if (!q) return allProducts.slice();
      return allProducts.filter((p) => {
        const hay = [
          p.name,
          p.brand,
          p.upc,
          p.price,
          p.stock
        ].map((v) => String(v || "").toLowerCase()).join(" ");
        return hay.includes(q) || normalizeUpc(p.upc).includes(normalizeUpc(q));
      });
    }

    function findByUpc(code) {
      const target = normalizeUpc(code);
      if (!target) return null;
      return allProducts.find((p) => normalizeUpc(p.upc) === target)
        || allProducts.find((p) => normalizeUpc(p.upc).endsWith(target) || target.endsWith(normalizeUpc(p.upc)));
    }

    function renderList(items) {
      const q = els.searchInput.value.trim();
      els.listStatus.textContent = q
        ? `${items.length} / ${allProducts.length} products (filtered)`
        : `${allProducts.length} products`;

      els.list.innerHTML = items.map((p) => `
        <div class="item">
          ${p.imageUrl ? `<img src="${escapeHtml(p.imageUrl)}" alt="" />` : `<div style="width:64px;height:64px;background:#eee;border-radius:8px;"></div>`}
          <div>
            <strong>${escapeHtml(p.name || "")}</strong>
            <div class="muted">${escapeHtml(p.brand || "")} · $${Number(p.price || 0).toFixed(2)} · stock ${Number(p.stock || 0)}${p.upc ? ` · UPC ${escapeHtml(String(p.upc))}` : ""}</div>
          </div>
          <div class="btns">
            <button type="button" class="secondary" data-edit="${escapeHtml(p.id)}">Edit</button>
            <button type="button" class="danger" data-del="${escapeHtml(p.id)}">Del</button>
          </div>
        </div>
      `).join("") || `<p class="muted">${q ? "검색 결과가 없습니다." : "아직 상품이 없습니다. 위에서 추가하세요."}</p>`;

      const byId = new Map(allProducts.map((p) => [p.id, p]));
      els.list.querySelectorAll("[data-edit]").forEach((btn) => {
        btn.addEventListener("click", () => fillForm(byId.get(btn.getAttribute("data-edit"))));
      });
      els.list.querySelectorAll("[data-del]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-del");
          const p = byId.get(id);
          if (!confirm(`삭제할까요?\n${p && p.name}`)) return;
          try {
            if (p && p.imagePath) {
              try { await storage.ref(p.imagePath).delete(); } catch (_) { /* ignore */ }
            }
            await db.collection(COLLECTION).doc(id).delete();
            await loadList();
          } catch (err) {
            alert(err.message || String(err));
          }
        });
      });
    }

    function applySearch() {
      renderList(filterProducts(els.searchInput.value));
    }

    async function loadList() {
      els.listStatus.textContent = "Loading...";
      const snap = await db.collection(COLLECTION).get();
      const items = [];
      snap.forEach((doc) => items.push({ id: doc.id, ...doc.data() }));
      items.sort((a, b) => String(a.brand || "").localeCompare(String(b.brand || "")) || String(a.name || "").localeCompare(String(b.name || "")));
      allProducts = items;
      applySearch();
    }

    async function saveProduct() {
      const name = els.name.value.trim();
      if (!name) {
        els.formError.textContent = "상품 이름을 입력하세요.";
        return;
      }
      els.formError.textContent = "";
      els.btnSave.disabled = true;
      try {
        const brand = els.brand.value.trim() || guessBrand(name);
        const price = Number(els.price.value) || 0;
        const stock = Number(els.stock.value) || 0;
        const upc = normalizeUpc(els.upc.value);
        const editId = els.editId.value.trim();
        const docRef = editId
          ? db.collection(COLLECTION).doc(editId)
          : db.collection(COLLECTION).doc();

        let imageUrl = editingImageUrl;
        let imagePath = editingImagePath;
        const file = els.image.files && els.image.files[0];
        if (file) {
          const safeName = file.name.replace(/[^\w.\-()+ ]+/g, "_");
          imagePath = `${PREFIX}/${docRef.id}/${Date.now()}_${safeName}`;
          const ref = storage.ref(imagePath);
          await ref.put(file);
          imageUrl = await ref.getDownloadURL();
        }

        await docRef.set({
          name,
          brand,
          price,
          stock,
          upc,
          imageUrl: imageUrl || "",
          imagePath: imagePath || "",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        resetForm();
        await loadList();
      } catch (err) {
        els.formError.textContent = err.message || String(err);
      } finally {
        els.btnSave.disabled = false;
      }
    }

    function applyScannedCode(code) {
      const trimmed = normalizeUpc(code);
      if (!trimmed) return;

      if (scanTarget === "search") {
        // 목록 검색용: 검색창에 넣고 상품 필터 (+ 일치하면 수정 폼)
        els.searchInput.value = trimmed;
        applySearch();
        const hit = findByUpc(trimmed);
        if (hit) fillForm(hit);
        return;
      }

      // 상품 추가/수정용: UPC 입력란만 채움 (검색·폼 로드 안 함)
      els.upc.value = trimmed;
      els.formError.textContent = "";
    }

    /* ---------- Camera scan (ULTRA ORDER barcode upgrade) ---------- */

    function initBarcodeDetector() {
      if (barcodeDetector || typeof BarcodeDetector === "undefined") return;
      try {
        barcodeDetector = new BarcodeDetector({
          formats: [
            "ean_13", "ean_8", "upc_a", "upc_e",
            "code_128", "code_39", "code_93",
            "itf", "codabar", "qr_code", "data_matrix"
          ]
        });
      } catch (e) {
        barcodeDetector = null;
      }
    }

    function getVideoDisplayMapping() {
      const video = document.getElementById("cameraVideo");
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const rect = video.getBoundingClientRect();
      const dw = rect.width;
      const dh = rect.height;
      if (!vw || !vh || !dw || !dh) return null;

      const videoAspect = vw / vh;
      const displayAspect = dw / dh;
      let scale, offsetX, offsetY;
      if (videoAspect > displayAspect) {
        scale = dh / vh;
        offsetX = (dw - vw * scale) / 2;
        offsetY = 0;
      } else {
        scale = dw / vw;
        offsetX = 0;
        offsetY = (dh - vh * scale) / 2;
      }
      return { scale, offsetX, offsetY, dw, dh };
    }

    function clearScanCanvas() {
      const canvas = document.getElementById("scanCanvas");
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function resizeScanCanvas() {
      const video = document.getElementById("cameraVideo");
      const canvas = document.getElementById("scanCanvas");
      const rect = video.getBoundingClientRect();
      canvas.width = rect.width * window.devicePixelRatio;
      canvas.height = rect.height * window.devicePixelRatio;
    }

    function drawBoundingBox(points, color, lineWidth) {
      if (!points || points.length < 2) return;
      const mapping = getVideoDisplayMapping();
      if (!mapping) return;
      const canvas = document.getElementById("scanCanvas");
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      resizeScanCanvas();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = color;
      ctx.lineWidth = (lineWidth || 3) * dpr;
      ctx.lineJoin = "round";
      const mapped = points.map((p) => ({
        x: (p.x * mapping.scale + mapping.offsetX) * dpr,
        y: (p.y * mapping.scale + mapping.offsetY) * dpr
      }));
      ctx.beginPath();
      ctx.moveTo(mapped[0].x, mapped[0].y);
      for (let i = 1; i < mapped.length; i++) ctx.lineTo(mapped[i].x, mapped[i].y);
      ctx.closePath();
      ctx.stroke();
    }

    function drawBoxFromResultPoints(resultPoints, color) {
      if (!resultPoints || resultPoints.length < 2) return;
      const points = resultPoints.map((p) => ({ x: p.getX(), y: p.getY() }));
      drawBoundingBox(points, color);
    }

    function drawBoxFromBarcodeDetector(barcode) {
      if (barcode.cornerPoints && barcode.cornerPoints.length >= 4) {
        drawBoundingBox(barcode.cornerPoints, "#e53935", 3);
      } else if (barcode.boundingBox) {
        const b = barcode.boundingBox;
        drawBoundingBox([
          { x: b.x, y: b.y },
          { x: b.x + b.width, y: b.y },
          { x: b.x + b.width, y: b.y + b.height },
          { x: b.x, y: b.y + b.height }
        ], "#e53935", 3);
      }
    }

    function setScanStatus(text, state) {
      const scanStatus = document.getElementById("scanStatus");
      scanStatus.textContent = text;
      scanStatus.className = "scan-status " + (state || "scanning");
    }

    function activateScanSession() {
      scanSessionActive = true;
      document.getElementById("scanTapOverlay").classList.add("hidden");
      document.getElementById("scanLine").classList.add("active");
      setScanStatus("바코드를 맞춰주세요", "scanning");
      startDetectionLoop();
    }

    async function startDetectionLoop() {
      if (!isScanning || !scanSessionActive) return;
      const now = Date.now();
      const video = document.getElementById("cameraVideo");
      if (barcodeDetector && video.readyState >= 2 && !isProcessingScan && (now - lastDetectTime) > 80) {
        lastDetectTime = now;
        try {
          const barcodes = await barcodeDetector.detect(video);
          if (barcodes.length > 0 && isScanning && scanSessionActive) {
            drawBoxFromBarcodeDetector(barcodes[0]);
            setScanStatus("스캔 중...", "detecting");
          } else if (!isProcessingScan) {
            clearScanCanvas();
            setScanStatus("바코드를 맞춰주세요", "scanning");
          }
        } catch (e) { /* skip frame */ }
      }
      detectionFrameId = requestAnimationFrame(startDetectionLoop);
    }

    function stopDetectionLoop() {
      if (detectionFrameId) {
        cancelAnimationFrame(detectionFrameId);
        detectionFrameId = null;
      }
    }

    function isValidBarcode(text) {
      const trimmed = text ? text.trim() : "";
      return trimmed.length >= 3 && /^[A-Za-z0-9\-_]+$/.test(trimmed);
    }

    function handleScanSuccess(trimmedText, result) {
      if (isProcessingScan) return;
      const now = Date.now();
      if (trimmedText === lastScannedCode && (now - lastScanTime) < scanDebounceTime) return;
      if (!isValidBarcode(trimmedText)) return;

      isProcessingScan = true;
      lastScannedCode = trimmedText;
      lastScanTime = now;

      if (result && result.getResultPoints) {
        drawBoxFromResultPoints(result.getResultPoints(), "#4CAF50");
      }
      setScanStatus("✓ 스캔 성공!", "success");
      document.getElementById("scanLine").classList.remove("active");
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

      setTimeout(() => {
        stopCameraScan();
        applyScannedCode(trimmedText);
        isProcessingScan = false;
      }, 400);
    }

    async function setupCameraTrack(videoElement) {
      const stream = videoElement.srcObject;
      if (!stream) return;
      cameraVideoTrack = stream.getVideoTracks()[0];
      if (!cameraVideoTrack) return;
      const flashBtn = document.getElementById("flashBtn");
      const capabilities = cameraVideoTrack.getCapabilities ? cameraVideoTrack.getCapabilities() : {};
      flashBtn.disabled = !capabilities.torch;
      flashEnabled = false;
      flashBtn.classList.remove("active");
      if (capabilities.zoom) {
        maxZoom = Math.min(capabilities.zoom.max || 2, 4);
        currentZoom = capabilities.zoom.min || 1;
      } else {
        maxZoom = 1;
      }
      document.getElementById("zoom2x").disabled = maxZoom < 1.5;
    }

    async function toggleFlash() {
      if (!cameraVideoTrack) return;
      flashEnabled = !flashEnabled;
      try {
        await cameraVideoTrack.applyConstraints({ advanced: [{ torch: flashEnabled }] });
        document.getElementById("flashBtn").classList.toggle("active", flashEnabled);
      } catch (e) {
        flashEnabled = !flashEnabled;
      }
    }

    async function setCameraZoom(level) {
      if (!cameraVideoTrack) return;
      const capabilities = cameraVideoTrack.getCapabilities ? cameraVideoTrack.getCapabilities() : {};
      if (!capabilities.zoom) return;
      const targetZoom = level === 2 ? Math.min(maxZoom, 2) : (capabilities.zoom.min || 1);
      try {
        await cameraVideoTrack.applyConstraints({ advanced: [{ zoom: targetZoom }] });
        currentZoom = targetZoom;
        document.getElementById("zoom1x").classList.toggle("active", level === 1);
        document.getElementById("zoom2x").classList.toggle("active", level === 2);
      } catch (e) { /* zoom not supported */ }
    }

    async function scanFromGallery(file) {
      if (!file || !codeReader) return;
      setScanStatus("이미지 분석 중...", "detecting");
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = async () => {
        try {
          const result = await codeReader.decodeFromImageElement(img);
          const text = result.getText ? result.getText() : result.text;
          URL.revokeObjectURL(url);
          if (isValidBarcode(text)) {
            handleScanSuccess(text.trim(), result);
          } else {
            setScanStatus("바코드를 찾을 수 없습니다", "scanning");
            setTimeout(() => {
              if (isScanning) setScanStatus("바코드를 맞춰주세요", "scanning");
            }, 2000);
          }
        } catch (e) {
          URL.revokeObjectURL(url);
          setScanStatus("바코드를 찾을 수 없습니다", "scanning");
          setTimeout(() => {
            if (isScanning) setScanStatus("바코드를 맞춰주세요", "scanning");
          }, 2000);
        }
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        setScanStatus("이미지를 불러올 수 없습니다", "scanning");
      };
      img.src = url;
    }

    async function startCameraScan(target) {
      if (isScanning) return;
      scanTarget = target || "upc";

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert("이 기기에서는 카메라 사용을 지원하지 않습니다.");
        return;
      }
      if (typeof ZXing === "undefined") {
        alert("ZXing 라이브러리를 불러오지 못했습니다.");
        return;
      }

      initBarcodeDetector();
      const overlay = document.getElementById("cameraOverlay");
      const videoElement = document.getElementById("cameraVideo");
      overlay.style.display = "flex";
      isScanning = true;
      scanSessionActive = false;
      isProcessingScan = false;
      clearScanCanvas();
      document.getElementById("scanTapOverlay").classList.remove("hidden");
      document.getElementById("scanLine").classList.remove("active");
      setScanStatus("카메라 초기화 중...", "scanning");

      try {
        if (!codeReader) codeReader = new ZXing.BrowserMultiFormatReader();
        else codeReader.reset();

        const devices = await codeReader.listVideoInputDevices();
        if (!devices || devices.length === 0) {
          alert("사용 가능한 카메라를 찾을 수 없습니다.");
          stopCameraScan();
          return;
        }

        const backCamera = devices.find((d) => /back|rear|후면|environment/i.test(d.label)) || devices[devices.length - 1];
        currentVideoInputDeviceId = backCamera.deviceId;
        const constraints = {
          video: {
            deviceId: { exact: currentVideoInputDeviceId },
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            focusMode: { ideal: "continuous" }
          }
        };

        const scanCallback = (result) => {
          if (!scanSessionActive || isProcessingScan) return;
          if (result) {
            const text = result.getText ? result.getText() : result.text;
            if (result.getResultPoints) {
              drawBoxFromResultPoints(result.getResultPoints(), "#e53935");
              setScanStatus("스캔 중...", "detecting");
            }
            handleScanSuccess(text ? text.trim() : "", result);
          }
        };

        await codeReader.decodeFromConstraints(constraints, videoElement, scanCallback);
        const onVideoReady = () => {
          resizeScanCanvas();
          setupCameraTrack(videoElement);
        };
        if (videoElement.readyState >= 1) onVideoReady();
        else videoElement.addEventListener("loadedmetadata", onVideoReady, { once: true });
        setScanStatus("탭하여 스캔 시작", "scanning");
      } catch (error) {
        console.error("카메라 스캔 오류:", error);
        alert("카메라를 시작하는 중 오류가 발생했습니다: " + error.message);
        stopCameraScan();
      }
    }

    function stopCameraScan() {
      const overlay = document.getElementById("cameraOverlay");
      stopDetectionLoop();
      overlay.style.display = "none";
      isScanning = false;
      scanSessionActive = false;
      isProcessingScan = false;
      lastScannedCode = null;
      lastScanTime = 0;
      flashEnabled = false;
      cameraVideoTrack = null;
      clearScanCanvas();
      document.getElementById("scanTapOverlay").classList.remove("hidden");
      document.getElementById("scanLine").classList.remove("active");
      document.getElementById("flashBtn").classList.remove("active");
      document.getElementById("zoom1x").classList.add("active");
      document.getElementById("zoom2x").classList.remove("active");
      if (codeReader) {
        try { codeReader.reset(); } catch (e) { console.error(e); }
      }
    }

    function isAdminUser(user) {
      const email = String((user && user.email) || "").trim().toLowerCase();
      const list = (window.FIREBASE_ADMIN_EMAILS || []).map((e) => String(e).trim().toLowerCase());
      return Boolean(email && list.includes(email));
    }

    function showLoggedIn(user) {
      els.btnLogout.classList.remove("hidden");
      if (!isAdminUser(user)) {
        els.loginCard.classList.remove("hidden");
        els.adminShell.classList.add("hidden");
        els.loginError.textContent = "관리자만 접근할 수 있습니다. (FIREBASE_ADMIN_EMAILS에 등록된 계정)";
        auth.signOut();
        return;
      }
      els.loginError.textContent = "";
      els.loginCard.classList.add("hidden");
      els.adminShell.classList.remove("hidden");
      loadList().catch((err) => {
        els.listStatus.textContent = err.message || String(err);
      });
    }

    function showLoggedOut() {
      stopCameraScan();
      els.loginCard.classList.remove("hidden");
      els.adminShell.classList.add("hidden");
      els.btnLogout.classList.add("hidden");
      resetForm();
      allProducts = [];
    }

    const fb = window.FIREBASE_CONFIG || {};
    if (!fb.apiKey || !window.firebase) {
      els.loginError.textContent = "firebase-config.js / SDK를 확인하세요.";
    } else {
      firebase.initializeApp(fb);
      auth = firebase.auth();
      db = firebase.firestore();
      storage = firebase.storage();

      els.btnLogin.addEventListener("click", async () => {
        els.loginError.textContent = "";
        try {
          await auth.signInWithEmailAndPassword(els.email.value.trim(), els.password.value);
        } catch (err) {
          els.loginError.textContent = err.message || String(err);
        }
      });
      els.password.addEventListener("keydown", (e) => {
        if (e.key === "Enter") els.btnLogin.click();
      });
      els.btnLogout.addEventListener("click", () => auth.signOut());
      els.btnSave.addEventListener("click", saveProduct);
      els.btnReset.addEventListener("click", resetForm);
      els.btnRefresh.addEventListener("click", () => loadList());
      els.searchInput.addEventListener("input", applySearch);
      els.btnClearSearch.addEventListener("click", () => {
        els.searchInput.value = "";
        applySearch();
      });
      els.btnScanUpc.addEventListener("click", () => startCameraScan("upc"));
      els.btnSearchScan.addEventListener("click", () => startCameraScan("search"));

      document.getElementById("scanTapBtn").addEventListener("click", activateScanSession);
      document.getElementById("scanTapOverlay").addEventListener("click", function (e) {
        if (e.target === this) activateScanSession();
      });
      document.getElementById("flashBtn").addEventListener("click", toggleFlash);
      document.getElementById("galleryBtn").addEventListener("click", () => {
        document.getElementById("galleryImageInput").click();
      });
      document.getElementById("galleryImageInput").addEventListener("change", function () {
        if (this.files && this.files[0]) {
          scanFromGallery(this.files[0]);
          this.value = "";
        }
      });
      document.getElementById("zoom1x").addEventListener("click", () => setCameraZoom(1));
      document.getElementById("zoom2x").addEventListener("click", () => setCameraZoom(2));
      document.getElementById("btnCloseCamera").addEventListener("click", stopCameraScan);
      window.addEventListener("resize", () => {
        if (isScanning) resizeScanCanvas();
      });

      auth.onAuthStateChanged((user) => {
        if (user) showLoggedIn(user);
        else showLoggedOut();
      });
    }
  </script>
</body>
</html>
