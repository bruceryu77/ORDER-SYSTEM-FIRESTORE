name: Sync Google Drive images

on:
  schedule:
    # GitHub cron is often delayed on free plans; keep several slots so it runs more often.
    - cron: "*/5 * * * *"
    - cron: "1,6,11,16,21,26,31,36,41,46,51,56 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [sync-drive-images]

permissions:
  contents: write

concurrency:
  group: sync-google-drive-images
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check GOOGLE_API_KEY secret
        env:
          HAS_KEY: ${{ secrets.GOOGLE_API_KEY != '' }}
        run: |
          echo "GOOGLE_API_KEY configured: $HAS_KEY"
          if [ "$HAS_KEY" != "true" ]; then
            echo "::error::GITHUB Secret GOOGLE_API_KEY is missing."
            echo "Add it at: Settings → Secrets and variables → Actions → New repository secret"
            echo "Name must be exactly: GOOGLE_API_KEY"
            echo "Also enable Google Drive API for that key."
            exit 1
          fi

      - name: Read public Drive folder
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node sync-drive-images.js

      - name: Commit changed image map
        shell: bash
        run: |
          if git diff --quiet -- config.js images-map.json; then
            echo "No image changes found."
            exit 0
          fi

          git add config.js images-map.json
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "chore: sync Google Drive images"
          git push
